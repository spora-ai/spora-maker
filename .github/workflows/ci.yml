name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  php-test:
    name: Pest tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.4']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: xdebug
          tools: composer

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: ${{ runner.os }}-php${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        run: ./vendor/bin/pest --no-coverage

      - name: Run tests with coverage (Clover XML for SonarQube)
        run: composer test:coverage:clover

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-clover
          path: coverage.xml

  php-lint:
    name: PHP lint (PHPStan + cs-fixer dry-run)
    runs-on: ubuntu-latest
    needs: php-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php8.4-${{ hashFiles('composer.json') }}
          restore-keys: ${{ runner.os }}-php8.4-

      - name: Install dev dependencies
        run: composer install --no-interaction --prefer-dist

      - name: PHPStan static analysis
        run: ./vendor/bin/phpstan analyse --no-progress
        continue-on-error: false

      - name: php-cs-fixer dry run
        run: ./vendor/bin/php-cs-fixer fix --dry-run --diff --allow-risky=yes
        continue-on-error: false

  sonarcloud:
    name: SonarCloud scan + coverage
    runs-on: ubuntu-latest
    needs: php-test
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: xdebug
          tools: composer

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php8.4-${{ hashFiles('composer.json') }}
          restore-keys: ${{ runner.os }}-php8.4-

      - name: Install dev dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-clover
          path: artifacts

      - name: Run SonarCloud scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f artifacts/coverage.xml ]; then
            echo "::error::coverage.xml not found in artifacts/ — php-test job may have failed"
            ls -la artifacts/ || true
            exit 1
          fi
          sonar-scanner \
            -Dsonar.projectKey=spora-ai_SporaMaker \
            -Dsonar.organization=spora-ai \
            -Dsonar.sources=src \
            -Dsonar.tests=tests \
            -Dsonar.php.coverage.reportPaths=artifacts/coverage.xml \
            -Dsonar.projectVersion=${GITHUB_SHA::7}