sonar.projectKey=spora-ai_SporaMaker
sonar.organization=spora-ai

# Sources and tests
sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=**/*Test.php,**/*.Test.php
sonar.exclusions=vendor/**,coverage/**

# PHP test coverage (clover XML produced by `composer test:coverage:clover`)
sonar.php.coverage.reportPaths=coverage.xml

# Source layout
sonar.sourceEncoding=UTF-8
sonar.php.file.suffixes=php
sonar.php.tests.file.suffixes=php